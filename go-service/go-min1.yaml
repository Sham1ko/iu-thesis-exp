apiVersion: serving.knative.dev/v1
kind: Service
metadata:
    name: go-benchmark-min-1
    namespace: default
spec:
    template:
        metadata:
            annotations:
                autoscaling.knative.dev/min-scale: "1"
        spec:
            containers:
                - image: kind.local/go-benchmark:v1
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8080
